<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Job Workshop – Invoice Tool{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-name">The Job Workshop</span>
        <span class="brand-sub">Invoice Generator</span>
      </div>
      <nav>
        <a href="{{ url_for('index') }}"
           class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
          Single Invoice
        </a>
        <a href="{{ url_for('bulk') }}"
           class="nav-link {% if request.endpoint == 'bulk' %}active{% endif %}">
          Bulk Upload
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      Career Catalyst Venture LLC &nbsp;·&nbsp; www.thejobworkshop.com
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
